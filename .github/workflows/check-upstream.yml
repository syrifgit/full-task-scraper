name: Check Upstream for Updates

on:
  schedule:
    # Runs daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream for new commits
        id: check
        run: |
          # Get the latest commit from upstream
          UPSTREAM_SHA=$(git ls-remote https://github.com/osrs-reldo/task-scraper.git HEAD | cut -f1)
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          # Read the last known SHA (stored as a workflow artifact via issue body)
          LAST_KNOWN=$(gh api repos/${{ github.repository }}/issues \
            --jq '[.[] | select(.labels[].name == "upstream-update") | select(.state == "open")] | .[0].body // ""' \
            2>/dev/null || echo "")

          if echo "$LAST_KNOWN" | grep -q "$UPSTREAM_SHA"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Upstream unchanged ($UPSTREAM_SHA)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            # Get commit details for the issue body
            COMMITS=$(git ls-remote https://github.com/osrs-reldo/task-scraper.git 'refs/heads/*' | head -5)
            echo "commits<<EOF" >> "$GITHUB_OUTPUT"
            echo "$COMMITS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close stale upstream issues
        if: steps.check.outputs.changed == 'true'
        run: |
          # Close any existing open upstream-update issues
          OPEN_ISSUES=$(gh api repos/${{ github.repository }}/issues \
            --jq '[.[] | select(.labels[].name == "upstream-update") | select(.state == "open")] | .[].number' \
            2>/dev/null || echo "")
          for ISSUE in $OPEN_ISSUES; do
            gh issue close "$ISSUE" -R "${{ github.repository }}" --comment "Superseded by newer upstream change."
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue for upstream update
        if: steps.check.outputs.changed == 'true'
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Upstream task-scraper has been updated" \
            --label "upstream-update" \
            --body "$(cat <<EOF
          The upstream repo [osrs-reldo/task-scraper](https://github.com/osrs-reldo/task-scraper) has new commits.

          **Latest upstream SHA:** \`${{ steps.check.outputs.upstream_sha }}\`

          **Action needed:** Review upstream changes and determine if this fork needs to be updated.

          \`\`\`
          git fetch upstream
          git log upstream/main --oneline -10
          \`\`\`

          Compare: https://github.com/osrs-reldo/task-scraper/compare/${{ steps.check.outputs.upstream_sha }}~5...${{ steps.check.outputs.upstream_sha }}
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
